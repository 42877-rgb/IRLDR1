<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Web Camera Detector</title>
    
    <!-- นำเข้า Google Fonts เพิ่มความพรีเมียม -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #ffffff;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            padding: 35px;
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        h2 {
            color: #ffffff;
            margin-bottom: 5px;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 13px;
            color: #b0bec5;
            margin-bottom: 25px;
        }

        .btn-start {
            background: linear-gradient(90deg, #00c6ff 0%, #0072ff 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4);
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 114, 255, 0.6);
        }

        .btn-start:disabled {
            background: #455a64;
            color: #90a4ae;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* กรอบแสดงผลกล้องแบบกระจกนิรภัย */
        .webcam-box {
            margin: 20px auto;
            border-radius: 16px;
            overflow: hidden;
            width: 220px;
            height: 220px;
            background-color: rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }

        #webcam-container canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        /* ไฟสถานะตรวจจับวิเคราะห์ผลทุก 3 วินาที */
        .status-dot {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 12px;
            height: 12px;
            background-color: #ff5252;
            border-radius: 50%;
            border: 2px solid white;
            transition: all 0.2s ease;
        }

        .status-dot.scanning {
            background-color: #69f0ae;
            box-shadow: 0 0 10px #69f0ae, 0 0 20px #69f0ae;
            transform: scale(1.2);
        }

        #label-container {
            margin-top: 25px;
            text-align: left;
        }

        /* แถบความแม่นยำ AI (Progress Bar) */
        .label-row {
            background: rgba(255, 255, 255, 0.08);
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            font-size: 14px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .label-text {
            display: flex;
            justify-content: space-between;
            position: relative;
            z-index: 2;
            font-weight: 600;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, rgba(0, 198, 255, 0.3) 0%, rgba(0, 114, 255, 0.3) 100%);
            z-index: 1;
            transition: width 0.4s ease-out;
            width: 0%;
        }

        /* แสดงข้อความแจ้งเตือนข้อผิดพลาดกลางหน้าจอ */
        .error-message {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            padding: 15px;
            border-radius: 10px;
            font-size: 13px;
            color: #ff8a80;
            margin-top: 15px;
            display: none;
            text-align: left;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Object Detector</h2>
    <div class="subtitle">Teachable Machine Image Model (3s Interval)</div>
    
    <button type="button" class="btn-start" id="start-btn" onclick="init()">เปิดระบบตรวจจับ</button>
    
    <div class="webcam-box">
        <div class="status-dot" id="dot"></div>
        <div id="webcam-container"></div>
    </div>
    
    <div id="error-box" class="error-message"></div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/flTyI50XI/";[cite: 6]

    let model, webcam, labelContainer, maxPredictions;
    let lastPredictTime = 0; 

    async function init() {
        const startBtn = document.getElementById("start-btn");
        const errorBox = document.getElementById("error-box");
        
        startBtn.disabled = true;
        startBtn.innerText = "กำลังเชื่อมต่อระบบ AI...";
        errorBox.style.display = "none";

        try {
            const modelURL = URL + "model.json";[cite: 6]
            const metadataURL = URL + "metadata.json";[cite: 6]

            // โหลดโมเดลผ่านโครงสร้างหลักดั้งเดิมป้องกันบั๊ก[cite: 6]
            model = await tmImage.load(modelURL, metadataURL);[cite: 6]
            maxPredictions = model.getTotalClasses();[cite: 6]

            // เปิดกล้องด้วยโมดูลมาตรฐานของ Teachable Machine[cite: 6]
            const flip = true; 
            webcam = new tmImage.Webcam(220, 220, flip);[cite: 6]
            await webcam.setup();[cite: 6]
            await webcam.play();[cite: 6]
            
            // รันอนิเมชันลูปกล้องให้ลื่นไหล[cite: 6]
            window.requestAnimationFrame(loop);[cite: 6]

            // นำแคนวาสใส่เข้าในพื้นที่แสดงผล[cite: 6]
            const container = document.getElementById("webcam-container");
            container.innerHTML = "";
            container.appendChild(webcam.canvas);[cite: 6]
            
            // สร้างอินเทอร์เฟซแสดงผลลัพธ์แบบแถบพลังความก้าวหน้า (Progress Bar)
            labelContainer = document.getElementById("label-container");[cite: 6]
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {[cite: 6]
                const row = document.createElement("div");
                row.className = "label-row";
                row.innerHTML = `
                    <div class="progress-bar" id="bar-${i}"></div>
                    <div class="label-text">
                        <span id="name-${i}">-</span>
                        <span id="val-${i}">0%</span>
                    </div>
                `;
                labelContainer.appendChild(row);
            }

            startBtn.innerText = "ระบบตรวจจับกำลังทำงาน";
            lastPredictTime = Date.now();

        } catch (error) {
            console.error(error);
            startBtn.disabled = false;
            startBtn.innerText = "ลองใหม่อีกครั้ง";
            
            // แสดงวิธีแก้ไขปัญหาหน้าจอดำ/เปิดกล้องไม่ได้ให้ผู้ใช้เห็นทันที
            errorBox.innerHTML = `
                <strong>⚠️ เปิดกล้องไม่สำเร็จ:</strong><br>
                1. ตรวจสอบว่าคุณเปิดหน้านี้ผ่านลิงก์ <strong>HTTPS</strong> บน GitHub Pages แล้วหรือยัง (เปิดไฟล์ตรงๆ ในเครื่องกล้องจะโดนบล็อก)<br>
                2. ตรวจสอบว่ากดยอมรับสิทธิ์อนุญาตกล้อง (Allow Camera) ที่มุมบนเบราว์เซอร์แล้วหรือยัง
            `;
            errorBox.style.display = "block";
        }
    }

    async function loop() {
        if(webcam) {
            webcam.update(); // ปล่อยให้ภาพวิดีโออัปเดตลื่นไหลทุกเฟรมปกติ[cite: 6]
            
            const currentTime = Date.now();
            // ตรวจสอบเงื่อนไขเวลา: ดักจับภาพส่งไปให้ AI ประมวลผลทุกๆ 3 วินาที (3000 มิลลิวินาที)
            if (currentTime - lastPredictTime >= 3000) {
                lastPredictTime = currentTime;
                
                // เอฟเฟกต์ไฟเขียวกะพริบแจ้งเตือนการสแกนรอบใหม่
                const dot = document.getElementById("dot");
                dot.classList.add("scanning");
                setTimeout(() => dot.classList.remove("scanning"), 400);
                
                await predict();
            }
        }
        window.requestAnimationFrame(loop);[cite: 6]
    }

    async function predict() {
        if (!model || !webcam) return;
        
        const prediction = await model.predict(webcam.canvas);[cite: 6]
        for (let i = 0; i < maxPredictions; i++) {[cite: 6]
            const className = prediction[i].className;
            const percentage = (prediction[i].probability * 100).toFixed(0);
            
            // อัปเดตข้อมูลและขยับแถบความแม่นยำ (Progress Bar) แบบเรียลไทม์
            document.getElementById(`name-${i}`).innerText = className;
            document.getElementById(`val-${i}`).innerText = percentage + "%";
            document.getElementById(`bar-${i}`).style.width = percentage + "%";
        }
    }
</script>

</body>
</html>
