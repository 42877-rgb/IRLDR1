<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model (Every 3s)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f5f7fb;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
            transition: 0.2s;
        }
        .btn-start { background-color: #28a745; color: white; }
        .btn-stop { background-color: #dc3545; color: white; }
        button:hover { opacity: 0.9; }
        #webcam-container {
            margin: 20px 0;
            border: 3px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            display: inline-block;
            height: 200px;
            width: 200px;
            background: #eee;
        }
        #label-container {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
        .prediction-item {
            margin: 5px 0;
            padding: 5px;
            background: #f8f9fa;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine Image Model</h2>
    
    <!-- ปุ่มควบคุม -->
    <button type="button" class="btn-start" onclick="init()">Start</button>
    <button type="button" class="btn-stop" onclick="stopWebcam()">Stop</button>
    
    <br>
    <div id="webcam-container"></div>
    <div id="label-container"></div>
</div>

<!-- สคริปต์ TensorFlow และ Teachable Machine -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // ลิงก์โมเดลของคุณ
    const URL = "https://teachablemachine.withgoogle.com/models/flTyI50XI/";

    let model, webcam, labelContainer, maxPredictions;
    let timerInterval = null; // ตัวแปรสำหรับเก็บค่า setInterval

    // โหลดโมเดลและตั้งค่ากล้อง
    async function init() {
        // ป้องกันการกด Start ซ้ำซ้อนตอนที่ระบบกำลังทำงานอยู่
        if (timerInterval) return; 

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        // โหลดโมเดล (ถ้ายังไม่ได้โหลด)
        if (!model) {
            document.getElementById("label-container").innerHTML = "กำลังโหลดโมเดล...";
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();
        }

        // ตั้งค่ากล้องเว็บแคม
        const flip = true; 
        webcam = new tmImage.Webcam(200, 200, flip); 
        await webcam.setup(); 
        await webcam.play();

        // แสดงผลหน้ากล้องบนหน้าจอ
        const webcamContainer = document.getElementById("webcam-container");
        webcamContainer.innerHTML = ""; // ล้างค่าเก่าออกก่อน
        webcamContainer.appendChild(webcam.canvas);
        
        // สร้างพื้นที่แสดงผลคำทำนาย
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";
        for (let i = 0; i < maxPredictions; i++) {
            const div = document.createElement("div");
            div.className = "prediction-item";
            labelContainer.appendChild(div);
        }

        // ทำนายผลครั้งแรกทันทีที่เปิดใช้งาน
        updateAndPredict();

        // เรียกใช้ฟังก์ชันทุกๆ 3 วินาที (3000 มิลลิวินาที) ตามที่ต้องการ
        timerInterval = setInterval(updateAndPredict, 3000); 
    }

    // ฟังก์ชันที่จะถูกเรียกทุกๆ 3 วินาที[cite: 1]
    async function updateAndPredict() {
        if (webcam) {
            webcam.update(); // อัปเดตเฟรมภาพจากกล้อง
            await predict(); // ส่งภาพไปให้โมเดลประมวลผล
        }
    }

    // ประมวลผลและทำนายวัตถุจากภาพในกล้อง
    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const classPrediction =
                prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
            labelContainer.childNodes[i].innerHTML = classPrediction;
        }
    }

    // ฟังก์ชันสำหรับหยุดการทำงานของกล้องและตัวจับเวลา
    function stopWebcam() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        if (webcam) {
            webcam.stop();
        }
        document.getElementById("label-container").innerHTML = "หยุดการทำงานแล้ว";
    }
</script>

</body>
</html>>
